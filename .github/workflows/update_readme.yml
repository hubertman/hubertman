name: Update README Activity

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README with recent activity
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const username = context.repo.owner;

            const events = await github.rest.activity.listPublicEventsForUser({
              username,
              per_page: 10
            });

            let activity = "### ⚡ Actividad reciente\n\n";

            for (const event of events.data) {
              const repo = event.repo?.name;
              if (!repo) continue;

              const repoUrl = `https://github.com/${repo}`;
              const date = new Date(event.created_at).toLocaleDateString("es-PE");

              let line = "";

              if (event.type === "PushEvent") {
                const branch = event.payload?.ref?.replace("refs/heads/", "") || "main";
                line = `- 🚀 Push en [${repo}](${repoUrl}) → ${branch} (${date})`;
              } 
              else if (event.type === "PullRequestEvent") {
                line = `- 🔀 Pull Request en [${repo}](${repoUrl}) (${date})`;
              } 
              else if (event.type === "IssuesEvent") {
                line = `- 🐛 Issue en [${repo}](${repoUrl}) (${date})`;
              } 
              else if (event.type === "WatchEvent") {
                line = `- ⭐ Star en [${repo}](${repoUrl}) (${date})`;
              } 
              else {
                continue; // filtra eventos irrelevantes
              }

              activity += line + "\n";
            }

            const readmePath = "README.md";

            if (!fs.existsSync(readmePath)) {
              throw new Error("README.md no encontrado");
            }

            const readme = fs.readFileSync(readmePath, "utf8");

            const newReadme = readme.replace(
              /<!--RECENT_ACTIVITY:start-->[\s\S]*<!--RECENT_ACTIVITY:end-->/,
              `<!--RECENT_ACTIVITY:start-->\n${activity}\n<!--RECENT_ACTIVITY:end-->`
            );

            fs.writeFileSync(readmePath, newReadme);

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "⚡ Update recent activity" || echo "No changes to commit"
          git push
