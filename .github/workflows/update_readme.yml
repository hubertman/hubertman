name: Update README Activity

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update README with recent activity
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const username = context.repo.owner;

            const events = await github.rest.activity.listPublicEventsForUser({
              username,
              per_page: 5
            });

            let activity = "### ⚡ Actividad reciente\n\n";

            for (const event of events.data) {
              const repo = event.repo?.name || "repo desconocido";
              const type = event.type;

              let line = "";

              if (type === "PushEvent") {
                let commitMsg = "";

                if (
                  event.payload &&
                  Array.isArray(event.payload.commits) &&
                  event.payload.commits.length > 0
                ) {
                  commitMsg = ` → "${event.payload.commits[0].message}"`;
                }

                line = `- ⬆️ Push en ${repo}${commitMsg}`;
              } else {
                line = `- 📌 ${type} en ${repo}`;
              }

              activity += line + "\n";
            }

            const readme = fs.readFileSync("README.md", "utf8");

            const newReadme = readme.replace(
              /<!--RECENT_ACTIVITY:start-->[\s\S]*<!--RECENT_ACTIVITY:end-->/,
              `<!--RECENT_ACTIVITY:start-->\n${activity}\n<!--RECENT_ACTIVITY:end-->`
            );

            fs.writeFileSync("README.md", newReadme);

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update recent activity" || echo "No changes"
          git push
